<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estilo DMC</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Sistema de Estilo</h1>

    <p>Pontos: <span id="pontos">0</span></p>
    <p>Rank: <span id="rank">-</span></p>
    <p>Dano Base: <span id="dano">0</span></p>

    <hr>

    <h3>Habilidades</h3>
    <ul id="habilidades"></ul>
  </div>

  <!-- 🎮 HUD -->
  <div class="bottom-bar">
    <button class="erro" onclick="errou()">Erro</button>
    <button class="acerto" onclick="acertou()">Acerto</button>
    <button class="devil" onclick="ativarDevilTrigger()">Devil</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
